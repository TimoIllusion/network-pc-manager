name: Build & Release Shutdown Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=v0.0.0-dev-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"
          fi

      - name: Build release package
        run: python build_agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shutdown-agent-windows
          path: dist/NetworkPCManager-ShutdownAgent-win-*.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-dev-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Shutdown Agent ${{ steps.version.outputs.tag }}"
          body: |
            ## Shutdown Agent Release

            ### Windows
            Download the zip, extract, and run `install.bat` as Administrator.
            No Python installation required.

            See the included `README.txt` for details.
          files: artifacts/**/*.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
