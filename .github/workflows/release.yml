name: Build & Release Shutdown Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Determine next version
        id: next_version
        shell: bash
        run: |
          # Get the latest v*.*.* tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          # Extract minor version and increment
          MINOR=$(echo "$LATEST_TAG" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="v0.${NEXT_MINOR}.0"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"
          echo "Next version: $NEXT_VERSION"

      - name: Build release package
        run: python build_agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shutdown-agent-windows
          path: dist/NetworkPCManager-ShutdownAgent-win-*.zip

    outputs:
      version: ${{ steps.next_version.outputs.version }}

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git tag ${{ needs.build-windows.outputs.version }}
          git push origin ${{ needs.build-windows.outputs.version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.version }}
          name: "Shutdown Agent ${{ needs.build-windows.outputs.version }}"
          body: |
            ## Shutdown Agent Release

            ### Windows
            Download the zip, extract, and run `install.bat` as Administrator.
            No Python installation required.

            See the included `README.txt` for details.
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
